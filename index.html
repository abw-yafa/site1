<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقعي المطور</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  margin-top: 100px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  margin: auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #0072ff;
}
</style>

</head>

<body>

<div class="container">

  <div class="card">
    <h1>🔥 موقعي المطور</h1>
    <p>مرحبًا بك في موقع أكثر جمالًا</p>
